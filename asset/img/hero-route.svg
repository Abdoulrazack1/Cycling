<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1410"/>
      <stop offset=".4" stop-color="#2a1a14"/>
      <stop offset="1" stop-color="#3a2820"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2520"/>
      <stop offset="1" stop-color="#1a1612"/>
    </linearGradient>
    <radialGradient id="sun" cx=".7" cy=".25" r=".4">
      <stop offset="0" stop-color="#CAA35B" stop-opacity=".6"/>
      <stop offset=".5" stop-color="#B08E4A" stop-opacity=".2"/>
      <stop offset="1" stop-color="#CAA35B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ciel & soleil -->
  <rect width="1400" height="900" fill="url(#sky)"/>
  <circle cx="980" cy="220" r="280" fill="url(#sun)"/>

  <!-- Collines en arrière-plan -->
  <path d="M0 580 Q200 520 400 560 T800 540 T1400 560 L1400 700 L0 700 Z" fill="#1a1410" opacity=".7"/>
  <path d="M0 620 Q300 580 600 600 T1400 590 L1400 720 L0 720 Z" fill="#0f0c08" opacity=".8"/>

  <!-- Route -->
  <path d="M0 720 L1400 720 L1400 900 L0 900 Z" fill="url(#road)"/>

  <!-- Marquages au sol (pointillés perspective) -->
  <g fill="#B08E4A" opacity=".55">
    <rect x="660" y="740" width="80" height="6"/>
    <rect x="650" y="765" width="100" height="7"/>
    <rect x="635" y="795" width="130" height="8"/>
    <rect x="615" y="830" width="170" height="10"/>
    <rect x="585" y="865" width="230" height="12"/>
  </g>

  <!-- Cycliste silhouette -->
  <g transform="translate(700, 440)">
    <!-- Roues -->
    <circle cx="-60" cy="160" r="55" fill="none" stroke="#1a1410" stroke-width="3"/>
    <circle cx="-60" cy="160" r="50" fill="none" stroke="#CAA35B" stroke-width="2.5"/>
    <circle cx="60"  cy="160" r="55" fill="none" stroke="#1a1410" stroke-width="3"/>
    <circle cx="60"  cy="160" r="50" fill="none" stroke="#CAA35B" stroke-width="2.5"/>
    <!-- Rayons -->
    <g stroke="#CAA35B" stroke-width="1" opacity=".7">
      <line x1="-60" y1="110" x2="-60" y2="210"/>
      <line x1="-110" y1="160" x2="-10" y2="160"/>
      <line x1="-95" y1="125" x2="-25" y2="195"/>
      <line x1="-25" y1="125" x2="-95" y2="195"/>
      <line x1="60" y1="110" x2="60" y2="210"/>
      <line x1="10" y1="160" x2="110" y2="160"/>
      <line x1="25" y1="125" x2="95" y2="195"/>
      <line x1="95" y1="125" x2="25" y2="195"/>
    </g>
    <!-- Cadre -->
    <g stroke="#CAA35B" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="-60" y1="160" x2="0"   y2="80"/>
      <line x1="0"   y1="80"  x2="60"  y2="160"/>
      <line x1="0"   y1="80"  x2="40"  y2="40"/>
      <line x1="-60" y1="160" x2="-30" y2="80"/>
      <line x1="-30" y1="80"  x2="-15" y2="40"/>
      <line x1="40"  y1="40"  x2="-15" y2="40"/>
    </g>
    <!-- Cycliste -->
    <g fill="#1a1410" stroke="#CAA35B" stroke-width="2">
      <!-- Tête -->
      <circle cx="-5" cy="-30" r="14"/>
      <!-- Casque -->
      <path d="M-20 -35 Q-5 -50 10 -35 L10 -30 L-20 -30 Z" fill="#CAA35B" stroke="#CAA35B"/>
      <!-- Buste -->
      <path d="M-10 -15 Q5 -10 25 5 L40 40 L20 60 L-15 30 Z" fill="#3a2820" stroke="#CAA35B"/>
      <!-- Bras -->
      <path d="M20 0 Q35 20 45 35" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Jambe avant -->
      <path d="M15 55 Q35 90 60 160" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Jambe arrière -->
      <path d="M5 55 Q-15 100 -25 130" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Texture vignette -->
  <radialGradient id="vignette" cx=".5" cy=".5" r=".75">
    <stop offset=".7" stop-color="#000" stop-opacity="0"/>
    <stop offset="1"  stop-color="#000" stop-opacity=".6"/>
  </radialGradient>
  <rect width="1400" height="900" fill="url(#vignette)"/>
</svg>
