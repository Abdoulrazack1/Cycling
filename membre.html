<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sociétaire · Club de Cyclisme de Salouel</title>
  <meta name="description" content="Profil public d'un sociétaire du C.C. Salouel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/css/style.css">
  <link rel="stylesheet" href="asset/css/polish.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%23B08E4A' stroke-width='1.5'/%3E%3Ctext x='16' y='22' font-family='Playfair Display' font-style='italic' font-size='18' fill='%23B08E4A' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="main">

  <section class="page-head">
    <div class="wrap">
      <nav class="breadcrumb">
        <a href="index.html">Accueil</a><span class="sep">/</span>
        <a href="membres.html">Sociétaires</a><span class="sep">/</span>
        <span id="bc-title">…</span>
      </nav>
      <div class="page-head-chapter"><em id="m-role">Sociétaire</em></div>
      <h1 class="d-l page-head-title" id="m-name">Chargement…</h1>
      <p class="page-head-sub" id="m-bio"></p>
      <div class="page-head-meta" id="m-meta"></div>
    </div>
  </section>

  <section class="section-sm">
    <div class="wrap membre-detail-grid">

      <aside data-reveal>
        <div style="background:var(--ink-2); border:1px solid var(--line); padding:32px; text-align:center;">
          <div id="m-avatar" style="width:120px;height:120px;border-radius:50%;background:var(--brass);color:var(--ink);font-family:var(--f-disp);font-size:48px;font-weight:500;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">?</div>
          <div style="font-family:var(--f-sans); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--parch-3); margin-bottom:8px;" id="m-num">№ —</div>
          <div style="font-family:var(--f-disp); font-size:22px; line-height:1.2; color:var(--parch); margin-bottom:8px;" id="m-fullname">—</div>
          <div id="m-username-wrap" style="font-family:var(--f-sans); font-size:13px; color:var(--parch-3); margin-bottom:24px;" hidden>
            <span style="opacity:.6;">@</span><span id="m-username"></span>
          </div>

          <div style="font-family:var(--f-sans); font-size:13px; color:var(--parch-2); line-height:1.7; text-align:left; border-top:1px solid var(--line-soft); padding-top:24px;">
            <div id="m-info-licence"  hidden style="display:flex; justify-content:space-between; padding:6px 0;"><span style="color:var(--parch-3);">Licence FFC</span><span></span></div>
            <div id="m-info-adhesion" hidden style="display:flex; justify-content:space-between; padding:6px 0;"><span style="color:var(--parch-3);">Adhérent depuis</span><span></span></div>
            <div id="m-info-ftp"      hidden style="display:flex; justify-content:space-between; padding:6px 0;"><span style="color:var(--parch-3);">FTP</span><span></span></div>
            <div id="m-info-role"              style="display:flex; justify-content:space-between; padding:6px 0;"><span style="color:var(--parch-3);">Rôle</span><span></span></div>
          </div>
        </div>
      </aside>

      <article data-reveal data-delay="80">
        <h2 class="d-m" style="margin-bottom:24px;">Saison <span class="it" id="m-year"></span></h2>
        <div class="page-head-meta" id="m-stats" style="margin-top:0;"></div>

        <div id="m-equipment-block" hidden style="margin-top:48px;">
          <h2 class="d-m" style="margin-bottom:24px;">Équipement</h2>
          <div id="m-equipment-list"></div>
        </div>

        <div id="m-palmares-block" hidden style="margin-top:48px;">
          <h2 class="d-m" style="margin-bottom:24px;">Palmarès</h2>
          <div id="m-palmares-list"></div>
        </div>

        <div style="margin-top:48px;">
          <a href="membres.html" class="btn btn-ghost">← Tous les sociétaires</a>
        </div>
      </article>
    </div>
  </section>

  </main>

  <script src="asset/js/config.js"></script>
  <script src="asset/js/utils.js"></script>
  <script src="asset/js/data.js"></script>
  <script src="asset/js/auth.js"></script>
  <script src="asset/js/main.js"></script>
  <script src="asset/js/pages/membre.js" defer></script>
</body>
</html>
