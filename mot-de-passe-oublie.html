<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié · Club de Cyclisme de Salouel</title>
  <meta name="description" content="Réinitialisation du mot de passe pour les sociétaires du C.C. Salouel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/css/style.css">
  <link rel="stylesheet" href="asset/css/polish.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%23B08E4A' stroke-width='1.5'/%3E%3Ctext x='16' y='22' font-family='Playfair Display' font-style='italic' font-size='18' fill='%23B08E4A' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="main">
    <div class="auth-page">
      <form class="auth-box" id="forgot-form" novalidate>
        <div class="auth-box-logo">S.</div>

        <h2 class="auth-box-title">Mot de passe <span class="it">oublié</span></h2>
        <p class="auth-box-sub">Entrez votre email de sociétaire. Un administrateur vous contactera sous 48 h pour réinitialiser votre accès.</p>

        <div id="forgot-error"   class="auth-error"   role="alert"  hidden></div>
        <div id="forgot-success" class="auth-success" role="status" hidden></div>

        <div class="field">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" type="email" autocomplete="email" required placeholder="antoine@club-salouel.fr">
        </div>

        <button class="btn btn-brass" id="forgot-btn" type="submit" style="width:100%;margin-top:24px;">
          Envoyer la demande
        </button>

        <div class="auth-switch">
          <a href="login.html" class="tab-link">← Retour à la connexion</a>
        </div>
      </form>
    </div>
  </main>

  <script src="asset/js/config.js"></script>
  <script src="asset/js/utils.js"></script>
  <script src="asset/js/data.js"></script>
  <script src="asset/js/auth.js"></script>
  <script src="asset/js/main.js"></script>
  <script>
  (() => {
    const form  = document.getElementById('forgot-form');
    const btn   = document.getElementById('forgot-btn');
    const errEl = document.getElementById('forgot-error');
    const sucEl = document.getElementById('forgot-success');
    const input = document.getElementById('forgot-email');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = input.value.trim();
      errEl.hidden = true; sucEl.hidden = true;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = 'Email invalide'; errEl.hidden = false; input.focus(); return;
      }
      btn.textContent = 'Envoi…'; btn.disabled = true;
      try {
        // Attendre que CCS_AUTH existe
        const waitFor = (cond, max = 30) => new Promise(resolve => {
          const tick = (n) => {
            if (cond()) return resolve(true);
            if (n >= max) return resolve(false);
            setTimeout(() => tick(n + 1), 60);
          };
          tick(0);
        });
        await waitFor(() => !!window.CCS_AUTH);

        const data = await window.CCS_AUTH.forgotPassword(email);
        sucEl.textContent = data.message || 'Demande enregistrée.';
        sucEl.hidden = false;
        input.value = '';
      } catch (err) {
        errEl.textContent = err.message || 'Erreur réseau — réessayez plus tard.';
        errEl.hidden = false;
      } finally {
        btn.textContent = 'Envoyer la demande'; btn.disabled = false;
      }
    });
  })();
  </script>
</body>
</html>
