<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- anti-FOUC : applique le theme enregistre avant le 1er paint -->
  <script>(function(){try{var t=localStorage.getItem('ccs.theme');if(['light','dark','auto'].indexOf(t)<0)t='dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <title>Mot de passe oublié · Club de Cyclisme de Salouel</title>
  <meta name="description" content="Réinitialisation du mot de passe pour les sociétaires du C.C. Salouel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/css/style.css">
    <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#B08E4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="C.C. Salouel">
  <link rel="apple-touch-icon" href="/asset/img/apple-touch-icon.png">
  <link rel="stylesheet" href="asset/css/polish.css">
  <link rel="icon" href="asset/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main" class="skip-link">Aller au contenu</a>
  <main id="main">
    <div class="auth-page">
      <form class="auth-box" id="forgot-form" novalidate>
        <div class="auth-box-logo">S.</div>

        <h2 class="auth-box-title">Mot de passe <span class="it">oublié</span></h2>
        <p class="auth-box-sub">Entrez votre email de sociétaire. Un administrateur vous contactera sous 48 h pour réinitialiser votre accès.</p>

        <div id="forgot-error"   class="auth-error"   role="alert"  hidden></div>
        <div id="forgot-success" class="auth-success" role="status" hidden></div>

        <div class="field">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" type="email" autocomplete="email" required placeholder="antoine@club-salouel.fr">
        </div>

        <button class="btn btn-brass" id="forgot-btn" type="submit" style="width:100%;margin-top:24px;">
          Envoyer la demande
        </button>

        <div class="auth-switch">
          <a href="login.html" class="tab-link">← Retour à la connexion</a>
        </div>
      </form>
    </div>
  </main>

  <script src="asset/js/config.js"></script>
  <script src="asset/js/utils.js"></script>
  <script src="asset/js/data-static.js"></script>
  <script src="asset/js/data.js"></script>
  <script src="asset/js/auth.js"></script>
  <script src="asset/js/main.js"></script>
  <script src="asset/js/pages/mot-de-passe-oublie.js" defer></script>
</body>
</html>
