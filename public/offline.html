<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- anti-FOUC : applique le theme enregistre avant le 1er paint -->
  <script>(function(){try{var t=localStorage.getItem('ccs.theme');if(['light','dark','auto'].indexOf(t)<0)t='dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <title>Hors-ligne · C.C. Salouel</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="asset/css/style.css">
  <link rel="stylesheet" href="asset/css/polish.css">
  <link rel="stylesheet" href="asset/css/offline.css">
  <link rel="icon" href="asset/img/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#B08E4A">
</head>
<body class="offline-body">
  <div class="offline-wrap">
    <div class="offline-kicker">— Hors-ligne —</div>
    <h1 class="offline-title">
      Pas de <span class="it">connexion</span>.
    </h1>
    <p class="offline-text">
      Le club roule, mais ton réseau s'est arrêté au pied du col. Vérifie ta connexion, puis recharge.
    </p>
    <button id="retry-btn" class="offline-btn">Réessayer</button>
    <div id="connection-status" class="offline-status"></div>
  </div>

  <script src="asset/js/offline.js" defer></script>
</body>
</html>
