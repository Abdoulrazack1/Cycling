<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- anti-FOUC : applique le theme enregistre avant le 1er paint -->
  <script>(function(){try{var t=localStorage.getItem('ccs.theme');if(['light','dark','auto'].indexOf(t)<0)t='dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <title>Événement · Club de Cyclisme de Salouel</title>
  <meta name="description" content="Détail d'un événement cycliste organisé par le C.C. Salouel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/css/style.css">
    <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#B08E4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="C.C. Salouel">
  <link rel="apple-touch-icon" href="/asset/img/apple-touch-icon.png">
  <link rel="stylesheet" href="asset/css/polish.css">
  <link rel="icon" href="asset/img/favicon.svg" type="image/svg+xml">
  <!-- OpenGraph + Twitter Card (Brief C5) -->
  <meta property="og:title" content="Événement · C.C. Salouel">
  <meta property="og:description" content="Détails de l'événement et inscription.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cc-salouel.fr/evenement.html">
  <meta property="og:image" content="https://cc-salouel.fr/asset/img/hero-peloton.svg">
  <meta property="og:locale" content="fr_FR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Événement · C.C. Salouel">
  <meta name="twitter:description" content="Détails de l'événement et inscription.">
  <link rel="canonical" href="https://cc-salouel.fr/evenement.html">
</head>
<body>
  <a href="#main" class="skip-link">Aller au contenu</a>
  <main id="main">

  <section class="page-head">
    <div class="wrap">
      <nav class="breadcrumb">
        <a href="index.html">Accueil</a><span class="sep">/</span>
        <a href="evenements.html">Événements</a><span class="sep">/</span>
        <span id="bc-title">…</span>
      </nav>
      <div class="page-head-chapter"><em id="ev-chapter">Événement</em></div>
      <h1 class="d-l page-head-title" id="ev-title">Chargement…</h1>
      <p class="page-head-sub" id="ev-subtitle"></p>
      <div class="page-head-meta" id="ev-meta"></div>
    </div>
  </section>

  <section class="section-sm">
    <div class="wrap event-detail-grid">

      <article class="prose-block" data-reveal>
        <div id="ev-description-block">
          <h2 class="d-m" style="margin-bottom:24px;">À <span class="it">propos</span></h2>
          <p id="ev-description" class="lede">Chargement…</p>
        </div>

        <div id="ev-parcours-block" hidden style="margin-top:48px;">
          <h2 class="d-m" style="margin-bottom:24px;">Le <span class="it">parcours</span></h2>
          <div id="ev-parcours-link"></div>
        </div>

        <div id="ev-inscrits-block" style="margin-top:48px;">
          <h2 class="d-m" style="margin-bottom:24px;">Les <span class="it">inscrits</span></h2>
          <div id="ev-inscrits-list" style="font-family:var(--f-sans); font-size:13px;">Chargement…</div>
        </div>
      </article>

      <aside class="sticky-side" data-reveal data-delay="80">
        <div class="ev-detail-card" style="background:var(--ink-2); border:1px solid var(--line); padding:28px; position:sticky; top:32px;">
          <div style="font-family:var(--f-sans); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--parch-3); margin-bottom:8px;" id="ev-date-label">—</div>
          <div style="font-family:var(--f-disp); font-size:28px; line-height:1.1; color:var(--parch); margin-bottom:24px;" id="ev-date-big">—</div>

          <div style="font-size:13px; font-family:var(--f-sans); color:var(--parch-2); line-height:1.7; margin-bottom:24px;">
            <div id="ev-info-lieu" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line-soft);">
              <span style="color:var(--parch-3);">Lieu</span>
              <span style="color:var(--parch);">—</span>
            </div>
            <div id="ev-info-distance" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line-soft);">
              <span style="color:var(--parch-3);">Distance</span>
              <span style="color:var(--parch);">—</span>
            </div>
            <div id="ev-info-engagement" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line-soft);">
              <span style="color:var(--parch-3);">Engagement</span>
              <span style="color:var(--parch);">—</span>
            </div>
            <div id="ev-info-inscrits" style="display:flex; justify-content:space-between; padding:8px 0;">
              <span style="color:var(--parch-3);">Inscrits</span>
              <span style="color:var(--parch);" id="ev-inscrits-count">—</span>
            </div>
          </div>

          <button type="button" class="btn btn-brass" id="btn-register" style="width:100%;">S'inscrire</button>
          <a href="evenements.html" class="btn btn-ghost" style="width:100%; margin-top:12px;">← Tous les événements</a>
        </div>
      </aside>

    </div>
  </section>

  </main>

  <!-- Modal d'inscription -->
  <div id="ev-modal" class="ev-modal" hidden role="dialog" aria-modal="true">
    <div class="ev-modal-backdrop" data-close></div>
    <div class="ev-modal-panel">
      <button type="button" class="ev-modal-close" aria-label="Fermer" data-close>×</button>
      <div class="ev-modal-chapter"><em>Inscription</em></div>
      <h3 class="ev-modal-title" id="ev-modal-title">—</h3>
      <p class="ev-modal-sub" id="ev-modal-sub">—</p>

      <div id="ev-form-error"   class="auth-error"   role="alert"  hidden style="margin-top:18px;"></div>
      <div id="ev-form-success" class="auth-success" role="status" hidden style="margin-top:18px;"></div>

      <form id="ev-form" class="event-inscr-form" novalidate>
        <div class="field-row">
          <div class="field"><label for="ev-prenom">Prénom *</label><input id="ev-prenom" type="text" autocomplete="given-name" required></div>
          <div class="field"><label for="ev-nom">Nom *</label><input id="ev-nom" type="text" autocomplete="family-name" required></div>
        </div>
        <div class="field-row">
          <div class="field"><label for="ev-email">Email *</label><input id="ev-email" type="email" autocomplete="email" required></div>
          <div class="field"><label for="ev-tel">Téléphone</label><input id="ev-tel" type="tel" autocomplete="tel"></div>
        </div>
        <div class="field-row">
          <div class="field"><label for="ev-cat">Catégorie</label>
            <select id="ev-cat">
              <option value="">— Indifférent —</option>
              <option value="loisir">Loisir / Découverte</option>
              <option value="sport">Sport (≥ 28 km/h)</option>
              <option value="expert">Expert / FFC</option>
              <option value="ecole">École de vélo (8–14 ans)</option>
            </select>
          </div>
          <div class="field"><label for="ev-dist">Distance (km)</label>
            <input id="ev-dist" type="number" min="0" placeholder="ex. 115">
          </div>
        </div>
        <div style="margin-top:24px; text-align:right;">
          <button type="button" class="btn btn-ghost" data-close>Annuler</button>
          <button type="submit" class="btn btn-brass" id="ev-submit">Confirmer l'inscription</button>
        </div>
      </form>
    </div>
  </div>

  <script src="asset/js/config.js"></script>
  <script src="asset/js/utils.js"></script>
  <script src="asset/js/data-static.js"></script>
  <script src="asset/js/data.js"></script>
  <script src="asset/js/auth.js"></script>
  <script src="asset/js/main.js"></script>
  <script src="asset/js/pages/evenement.js" defer></script>
</body>
</html>
