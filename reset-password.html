<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser le mot de passe · Club de Cyclisme de Salouel</title>
  <meta name="description" content="Choisissez un nouveau mot de passe pour votre compte sociétaire.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/css/style.css">
    <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#B08E4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="C.C. Salouel">
  <link rel="apple-touch-icon" href="/asset/img/apple-touch-icon.png">
  <link rel="stylesheet" href="asset/css/polish.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%23B08E4A' stroke-width='1.5'/%3E%3Ctext x='16' y='22' font-family='Playfair Display' font-style='italic' font-size='18' fill='%23B08E4A' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
</head>
<body>
  <a href="#main" class="skip-link">Aller au contenu</a>
  <main id="main">
    <div class="auth-page">
      <form class="auth-box" id="reset-form" novalidate>
        <div class="auth-box-logo">S.</div>

        <h2 class="auth-box-title">Nouveau <span class="it">mot de passe</span></h2>
        <p class="auth-box-sub" id="reset-sub">Choisissez un nouveau mot de passe. Le lien expire 24 heures après sa génération.</p>

        <div id="reset-error"   class="auth-error"   role="alert"  hidden></div>
        <div id="reset-success" class="auth-success" role="status" hidden></div>

        <div class="field">
          <label for="reset-pw">Nouveau mot de passe</label>
          <input id="reset-pw" type="password" autocomplete="new-password" required minlength="8" placeholder="8 caractères minimum">
        </div>

        <div class="field">
          <label for="reset-pw2">Confirmer le mot de passe</label>
          <input id="reset-pw2" type="password" autocomplete="new-password" required>
        </div>

        <button class="btn btn-brass" id="reset-btn" type="submit" style="width:100%;margin-top:24px;">
          Réinitialiser
        </button>

        <div class="auth-switch">
          <a href="login.html" class="tab-link">← Retour à la connexion</a>
        </div>
      </form>
    </div>
  </main>

  <script src="asset/js/config.js"></script>
  <script src="asset/js/utils.js"></script>
  <script src="asset/js/data-static.js"></script>
  <script src="asset/js/data.js"></script>
  <script src="asset/js/auth.js"></script>
  <script src="asset/js/main.js"></script>
  <script src="asset/js/pages/reset-password.js" defer></script>
</body>
</html>
