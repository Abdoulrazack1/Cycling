# GitHub Actions — Cf. AUDIT items #27, #28
#
# Lance à chaque push/PR :
#   1. node --test (tests unitaires sur les helpers purs)
#   2. node scripts/validate-gpx.js (vérifie l'intégrité des GPX)
#   3. npm audit (alerte si nouvelle CVE dans les deps)
#
# Aucun secret nécessaire — tout tourne en local au runner.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.17.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all JS files)
        run: |
          for f in routes/*.js services/*.js scripts/*.js middleware/*.js config/*.js seed.js server.js asset/js/*.js; do
            node --check "$f" || exit 1
          done

      - name: Run unit tests
        run: npm test

      - name: Validate GPX files (informative)
        run: node scripts/validate-gpx.js || true
        # `|| true` — pour l'instant les 4 GPX faux signalés par l'audit
        # ne sont PAS un blocker CI. Retirer le `|| true` quand ils auront
        # été régénérés via `node scripts/generate-gpx.js --all`.

      - name: Security audit (production deps only)
        run: npm audit --omit=dev --audit-level=high
